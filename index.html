            </div>
          </div>
        </div>

        {/* PROFILE SETUP BANNER — shown until profile is complete */}
        {!profileFilled && (
          <div onClick={() => { setProfileOpen(true); setProfileSection("recommend"); }}
            style={{ margin: "0 28px", marginTop: 12, padding: "12px 16px", background: C.sandLight, border: `1px solid ${C.sandBorder}`, borderRadius: 12, cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center", animation: "fadeIn 0.3s ease" }}>
            <div>
              <div style={{ fontSize: 12, fontWeight: 500, color: C.sand }}>Personalise Aela</div>
              <div style={{ fontSize: 11, color: C.muted, marginTop: 2 }}>Add your stats to unlock your exact calorie and macro targets</div>
            </div>
            <span style={{ color: C.sand, fontSize: 18 }}>→</span>
          </div>
        )}

        {/* DATE NAVIGATION */}
        <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 12, padding: "10px 28px 0" }}>
          <button onClick={() => shiftDay(-1)}
            style={{ background: "none", border: `1px solid ${C.border}`, borderRadius: 8, color: C.muted, cursor: "pointer", width: 30, height: 30, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14 }}>‹</button>
          <div style={{ fontSize: 12, fontWeight: 500, color: isToday ? C.sage : C.text, fontFamily: "'Jost',sans-serif", minWidth: 100, textAlign: "center" }}>
            {isToday ? "Today" : viewLabel}
            {!isToday && <div style={{ fontSize: 10, color: C.muted, marginTop: 1 }}>viewing past day</div>}
          </div>
          <button onClick={() => shiftDay(1)} disabled={isToday}
            style={{ background: "none", border: `1px solid ${isToday ? C.surface : C.border}`, borderRadius: 8, color: isToday ? C.surface : C.muted, cursor: isToday ? "default" : "pointer", width: 30, height: 30, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14 }}>›</button>
          {!isToday && (
            <button onClick={() => setViewingDate(todayDate)}
              style={{ ...SS.cta, fontSize: 11, padding: "5px 12px" }}>Back to Today</button>
          )}
        </div>

        {/* TABS */}
        <div style={tabsStyle}>
          {[{ id: "today", label: "Today" }, { id: "nutrition", label: "Nutrition" }, { id: "wellness", label: "Wellness" }, { id: "explore", label: "Explore" }].map(t => (
            <button key={t.id} style={tabBtn(tab === t.id)} onClick={() => setTab(t.id)}>{t.label}</button>
          ))}
        </div>

        {/* CONTENT */}
        <div style={contentStyle}>
          {tab === "today" && renderToday()}
          {tab === "explore" && renderExplore()}
          {tab === "nutrition" && (
            <>
              <div style={{ display: "flex", background: C.white, border: `1px solid ${C.border}`, borderRadius: 12, padding: 4, marginBottom: 16, gap: 4 }}>
                {[{ id: "summary", label: "Summary" }, { id: "log", label: "Log Food" }].map(t => (
                  <button key={t.id} onClick={() => setNutritionSubTab(t.id)}
                    style={{ flex: 1, padding: "8px 0", border: "none", borderRadius: 9, cursor: "pointer", fontSize: 12, fontWeight: 500, fontFamily: "'Jost',sans-serif", letterSpacing: "0.06em", background: nutritionSubTab === t.id ? C.sage : "transparent", color: nutritionSubTab === t.id ? C.white : C.muted, transition: "all 0.2s" }}>
                    {t.label}
                  </button>
                ))}
              </div>
              {/* Summary → Log Food continuity hint */}
              {nutritionSubTab === "summary" && meals.length > 0 && (
                <div onClick={() => setNutritionSubTab("log")}
                  style={{ marginBottom: 12, padding: "9px 14px", background: C.sageLight, border: `1px solid ${C.sageBorder}`, borderRadius: 10, cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <span style={{ fontSize: 11, color: C.sage }}>✓ {meals.length} item{meals.length !== 1 ? "s" : ""} logged today · last updated {meals.length > 0 ? new Date(Math.max(...meals.map(m => m.id))).toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit" }) : ""}</span>
                  <span style={{ fontSize: 11, color: C.sage }}>View log →</span>
                </div>
              )}
              {nutritionSubTab === "summary" && renderNutritionSummary()}
              {nutritionSubTab === "log"     && renderDietLog()}
            </>
          )}
          {tab === "wellness" && renderWellness()}
        </div>

        {/* PROFILE DRAWER */}
        {profileOpen && (
          <>
            <DrawerBackdrop onClose={() => setProfileOpen(false)} />
            <div style={drawerStyle}>
              <div style={drawerHeaderStyle}>
                <div style={{ fontSize: 18, fontFamily: "'Cormorant Garamond',serif", fontWeight: 300, color: C.text }}>Your Aela Profile</div>
                <CloseBtn onClose={() => setProfileOpen(false)} />
              </div>
              <div style={{ display: "flex", padding: "0 24px", borderBottom: `1px solid ${C.border}` }}>
                {[{ id: "goals", label: "Calorie Calculator" }, { id: "recommend", label: "Goals" }, { id: "trends", label: "Trends" }].map(t => (
                  <button key={t.id} onClick={() => setProfileSection(t.id)}
                    style={{ padding: "13px 14px", border: "none", cursor: "pointer", fontSize: 11, fontWeight: 500, fontFamily: "'Jost',sans-serif", letterSpacing: "0.1em", textTransform: "uppercase", background: "transparent", color: profileSection === t.id ? C.sage : C.muted, borderBottom: profileSection === t.id ? `1.5px solid ${C.sage}` : "1.5px solid transparent", transition: "all 0.2s" }}>{t.label}</button>
                ))}
              </div>
              {/* Calorie Calculator → Goals connection note */}
              {profileSection === "goals" && (
                <div style={{ margin: "12px 20px 0", padding: "10px 14px", background: C.sageLight, border: `1px solid ${C.sageBorder}`, borderRadius: 10, fontSize: 11, color: C.sage, lineHeight: 1.5 }}>
                  {profileFilled ? "✓ Targets are auto-calculated from your profile. Adjust sliders manually to override." : "⚡ Fill in the Goals tab with your stats to auto-calculate your personalised targets."}
                  {!profileFilled && <span onClick={() => setProfileSection("recommend")} style={{ marginLeft: 6, textDecoration: "underline", cursor: "pointer" }}>Go to Goals →</span>}
                </div>
              )}
              <div style={{ padding: "16px 20px", flex: 1 }}>
                {profileSection === "goals" && <GoalsTab goals={goals} setGoals={setGoals} calGoal={calGoal} />}
                {profileSection === "recommend" && (
                  <RecommendTab profile={profile} setProfile={setProfile} rec={rec}
                    unitSystem={unitSystem} imperialWeight={imperialWeight} setImperialWeight={setImperialWeight}
                    imperialFeet={imperialFeet} setImperialFeet={setImperialFeet}
                    imperialInches={imperialInches} setImperialInches={setImperialInches}
                    lbsToKg={lbsToKg} kgToLbs={kgToLbs} cmToFtIn={cmToFtIn} ftInToCm={ftInToCm}
                    switchToImperial={switchToImperial} switchToMetric={switchToMetric} />
                )}
                {profileSection === "trends" && renderWeek()}
              </div>
            </div>
          </>
        )}

        {/* SETTINGS DRAWER */}
        {settingsOpen && (
          <>
            <DrawerBackdrop onClose={() => setSettingsOpen(false)} />
            {renderSettings()}
          </>
        )}

      </div>
    </>
  );
}


    // Mount
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(WellnessTracker));

    // Hide splash
    setTimeout(function() {
      var splash = document.getElementById('splash');
      if (splash) {
        splash.classList.add('hidden');
        setTimeout(function() { splash.remove(); }, 600);
      }
    }, 1400);
  </script>
