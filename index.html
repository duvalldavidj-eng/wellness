<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1C2128">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Aela">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="description" content="Aela — your hybrid athlete wellness tracker.">
  <title>Aela</title>

  <link rel="manifest" href="manifest.json">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Jost:wght@300;400;500;600&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; height: 100%; width: 100%;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
      font-family: 'Jost', sans-serif;
    }
    body {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    #root { min-height: 100vh; }

    #splash {
      position: fixed; inset: 0; z-index: 9999;
      background: #1C2128;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      transition: opacity 0.5s ease;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }
    #splash .wordmark {
      font-family: 'Syncopate', sans-serif;
      font-size: 26px; font-weight: 700;
      letter-spacing: 0.22em; color: #E8ECF0;
    }
    #splash .tagline {
      font-family: 'Jost', sans-serif;
      font-size: 10px; font-weight: 500;
      letter-spacing: 0.28em; text-transform: uppercase; color: #B06A3A;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:0.6; transform:scale(0.95); }
    }

    #ios-install {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #1C2128; color: #E8ECF0;
      padding: 20px; padding-bottom: calc(20px + env(safe-area-inset-bottom));
      z-index: 500; border-top: 1px solid #2A3140;
      font-family: 'Jost', sans-serif;
      display: none; flex-direction: column; gap: 10px;
      animation: slideUp 0.3s ease;
    }
    #ios-install.show { display: flex; }
    .install-step { display:flex; gap:10px; align-items:center; font-size:12px; color:#8A96A0; }
    .install-step strong { color:#E8ECF0; }
    @keyframes slideUp {
      from { transform:translateY(100%); }
      to   { transform:translateY(0); }
    }

    #install-banner {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #1C2128; color: #E8ECF0;
      padding: 16px 20px; padding-bottom: calc(16px + env(safe-area-inset-bottom));
      display: none; flex-direction: column; gap: 10px;
      z-index: 500; border-top: 1px solid #2A3140;
      font-family: 'Jost', sans-serif;
      animation: slideUp 0.3s ease;
    }
    #install-banner.show { display: flex; }
  </style>
</head>
<body>

  <!-- Splash screen -->
  <div id="splash">
    <svg style="animation:pulse 2s ease-in-out infinite" width="60" height="68" viewBox="0 0 80 90" fill="none">
      <path d="M40 4 L6 86" stroke="#E8ECF0" stroke-width="5.5" stroke-linecap="round"/>
      <path d="M40 4 L74 86" stroke="#E8ECF0" stroke-width="5.5" stroke-linecap="round"/>
      <path d="M22 52 Q40 38 58 52" stroke="#B06A3A" stroke-width="4" stroke-linecap="round" fill="none"/>
      <circle cx="22" cy="52" r="2.5" fill="#B06A3A"/>
      <circle cx="58" cy="52" r="2.5" fill="#B06A3A"/>
    </svg>
    <div class="wordmark">AELA</div>
    <div class="tagline">Built for the long game</div>
  </div>

  <!-- App root -->
  <div id="root"></div>

  <!-- iOS add to home screen prompt -->
  <div id="ios-install">
    <div style="font-size:13px;font-weight:500;">Add Aela to your Home Screen</div>
    <div class="install-step"><span>1.</span><span>Tap <strong>Share</strong> in Safari's toolbar</span></div>
    <div class="install-step"><span>2.</span><span>Tap <strong>Add to Home Screen</strong></span></div>
    <div class="install-step"><span>3.</span><span>Tap <strong>Add</strong></span></div>
    <button onclick="document.getElementById('ios-install').classList.remove('show');localStorage.setItem('aela_ios','1')"
      style="padding:10px;border:1px solid #2A3140;border-radius:10px;background:transparent;color:#5A6478;font-family:'Jost',sans-serif;font-size:12px;cursor:pointer;">
      Got it
    </button>
  </div>

  <!-- Android/Chrome install banner -->
  <div id="install-banner">
    <div>
      <div style="font-size:13px;font-weight:500;">Add Aela to your Home Screen</div>
      <div style="font-size:11px;color:#5A6478;margin-top:3px;">Install for the full app experience — works offline too.</div>
    </div>
    <div style="display:flex;gap:8px;">
      <button id="btn-install" style="flex:1;padding:10px;border:none;border-radius:10px;background:#B06A3A;color:white;font-family:'Jost',sans-serif;font-size:12px;font-weight:500;cursor:pointer;">Install App</button>
      <button id="btn-dismiss" style="padding:10px 16px;border:1px solid #2A3140;border-radius:10px;background:transparent;color:#5A6478;font-family:'Jost',sans-serif;font-size:12px;cursor:pointer;">Not now</button>
    </div>
  </div>

  <!-- React from CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script>
    // Expose hooks globally for the inlined component
    var useState   = React.useState;
    var useEffect  = React.useEffect;
    var useCallback= React.useCallback;
    var useRef     = React.useRef;
    var useMemo    = React.useMemo;

    // PWA install (Android/Chrome)
    var deferredPrompt;
    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      deferredPrompt = e;
      if (!localStorage.getItem('aela_install')) {
        setTimeout(function() {
          document.getElementById('install-banner').classList.add('show');
        }, 3500);
      }
    });
    document.getElementById('btn-install').addEventListener('click', function() {
      document.getElementById('install-banner').classList.remove('show');
      if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; }
    });
    document.getElementById('btn-dismiss').addEventListener('click', function() {
      document.getElementById('install-banner').classList.remove('show');
      localStorage.setItem('aela_install', '1');
    });

    // iOS prompt
    var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    var isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
    if (isIOS && !isStandalone && !localStorage.getItem('aela_ios')) {
      setTimeout(function() {
        document.getElementById('ios-install').classList.add('show');
      }, 4000);
    }

    // Service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function(){});
    }
  </script>

// ─── TDEE ENGINE ──────────────────────────────────────────────────────────────
function computeRec(p) {
  if (!p.age || !p.weight || !p.height) return null;
  const kg = parseFloat(p.weight), cm = parseFloat(p.height), age = parseFloat(p.age);
  if ([kg, cm, age].some(isNaN)) return null;
  const bmr = p.gender === "male"
    ? 10 * kg + 6.25 * cm - 5 * age + 5
    : 10 * kg + 6.25 * cm - 5 * age - 161;
  const mult = { sedentary: 1.2, light: 1.375, moderate: 1.55, active: 1.725, very_active: 1.9 };
  const tdee = Math.round(bmr * (mult[p.activity] || 1.55));
  const targets = { fat_loss: tdee - 400, muscle_gain: tdee + 150, body_recomp: tdee - 150, maintenance: tdee };
  const t = Math.round(targets[p.fitnessGoal] || tdee);
  const ratios = { fat_loss: [2.2, 0.25], muscle_gain: [2.3, 0.28], body_recomp: [2.4, 0.27], maintenance: [1.8, 0.30] };
  const [pgk, fp] = ratios[p.fitnessGoal] || ratios.maintenance;
  const pG = Math.round(kg * pgk), fG = Math.round(t * fp / 9);
  const cG = Math.max(50, Math.round((t - pG * 4 - fG * 9) / 4));
  const actual = pG * 4 + cG * 4 + fG * 9;
  return {
    bmr: Math.round(bmr), tdee, targetCals: t,
    protein: pG, carbs: cG, fat: fG,
    proteinPct: Math.round(pG * 4 / actual * 100),
    carbsPct: Math.round(cG * 4 / actual * 100),
    fatPct: Math.round(fG * 9 / actual * 100),
  };
}

// Sparkline chart (module-level, no hooks needed)
function Sparkline({ points, valueKey, color, chartHeight = 50, goal = null }) {
  if (!points || points.length < 2) {
    return <div style={{ height: chartHeight, display: "flex", alignItems: "center", color: C.muted, fontSize: 11 }}>Not enough data yet</div>;
  }
  const vals = points.map(p => p[valueKey]);
  const minV = Math.min(...vals) * 0.97;
  const maxV = Math.max(...vals) * 1.03;
  const range = Math.max(maxV - minV, 1);
  const W = 100, H = chartHeight;
  const toX = (i) => (i / (points.length - 1)) * W;
  const toY = (v) => H - ((v - minV) / range) * H;
  const pathD = points.map((p, i) => `${i === 0 ? "M" : "L"}${toX(i).toFixed(1)},${toY(p[valueKey]).toFixed(1)}`).join(" ");
  const avg = Math.round(vals.reduce((a, b) => a + b, 0) / vals.length * 10) / 10;
  return (
    <div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: chartHeight, overflow: "visible" }}>
        {goal !== null && (
          <line x1="0" y1={toY(goal).toFixed(1)} x2={W} y2={toY(goal).toFixed(1)}
            stroke={C.border} strokeWidth="0.8" strokeDasharray="2,2" />
        )}
        <path d={pathD} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
        <circle cx={toX(points.length - 1).toFixed(1)} cy={toY(vals[vals.length - 1]).toFixed(1)} r="2.5" fill={color} />
      </svg>
      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, color: C.muted, marginTop: 4 }}>
        <span>{points[0].date}</span>
        <span style={{ color }}>avg {avg}{valueKey === "weight" ? " kg" : valueKey === "sleep" ? "h" : " kcal"}</span>
        <span>{points[points.length - 1].date}</span>
      </div>
    </div>
  );
}

          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, color: C.muted, marginTop: 2 }}>
            <span>{min}g</span><span>{max}g</span>
          </div>
        </div>
      ))}

      <div style={{ borderTop: `1px solid ${C.border}`, paddingTop: 14, display: "flex", flexDirection: "column", gap: 6 }}>
        <div style={{ fontSize: 10, color: C.muted, letterSpacing: "0.16em", textTransform: "uppercase", marginBottom: 4 }}>Calorie Breakdown</div>
        {MACRO_SLIDERS.map(({ key, label, kcalPerG, color }) => {

            <div key={key} style={{ display: "flex", alignItems: "center", gap: 10, fontSize: 12 }}>

                style={{ padding: "5px 12px", borderRadius: 99, border: "none", cursor: "pointer", fontSize: 11, fontWeight: 500, fontFamily: "'Jost',sans-serif", background: unitSystem === u.val ? C.sage : "transparent", color: unitSystem === u.val ? C.white : C.muted, transition: "all 0.2s" }}>
                {u.label}
              </button>
            ))}
          </div>
        </div>

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 16 }}>
          <div>
            <div style={SS.fl}>Age (years)</div>
            <input style={SS.input} type="number" placeholder="28" value={profile.age} onChange={e => setProfile(p => ({ ...p, age: e.target.value }))} />
          </div>
          <div>
            <div style={SS.fl}>Weight ({unitSystem === "metric" ? "kg" : "lbs"})</div>
            {unitSystem === "metric"
              ? <input style={SS.input} type="number" placeholder="75" value={profile.weight} onChange={e => setProfile(p => ({ ...p, weight: e.target.value }))} />
              : <input style={SS.input} type="number" placeholder="165" value={imperialWeight} onChange={e => { setImperialWeight(e.target.value); if (e.target.value) setProfile(p => ({ ...p, weight: lbsToKg(e.target.value) })); }} />
            }
          </div>
          <div style={{ gridColumn: "1/-1" }}>
            <div style={SS.fl}>Height ({unitSystem === "metric" ? "cm" : "ft & in"})</div>
            {unitSystem === "metric"
              ? <input style={SS.input} type="number" placeholder="175" value={profile.height} onChange={e => setProfile(p => ({ ...p, height: e.target.value }))} />
              : (
                <div style={{ display: "flex", gap: 8 }}>
                  <div style={{ flex: 1, position: "relative" }}>
                    <input style={SS.input} type="number" placeholder="5" value={imperialFeet} onChange={e => { setImperialFeet(e.target.value); setProfile(p => ({ ...p, height: String(ftInToCm(e.target.value, imperialInches)) })); }} />
                    <span style={{ position: "absolute", right: 10, top: "50%", transform: "translateY(-50%)", fontSize: 11, color: C.sage, pointerEvents: "none" }}>ft</span>
                  </div>
                  <div style={{ flex: 1, position: "relative" }}>
                    <input style={SS.input} type="number" placeholder="10" min={0} max={11} value={imperialInches} onChange={e => { setImperialInches(e.target.value); setProfile(p => ({ ...p, height: String(ftInToCm(imperialFeet, e.target.value)) })); }} />
                    <span style={{ position: "absolute", right: 10, top: "50%", transform: "translateY(-50%)", fontSize: 11, color: C.sage, pointerEvents: "none" }}>in</span>
                  </div>
                </div>
              )
            }
            {profile.weight && profile.height && (
              <div style={{ fontSize: 10, color: C.muted, marginTop: 6 }}>
                {unitSystem === "imperial" ? `≈ ${profile.weight} kg · ${profile.height} cm` : `≈ ${kgToLbs(profile.weight)} lbs · ${cmToFtIn(profile.height).ft}′${cmToFtIn(profile.height).inc}″`}
              </div>
            )}
          </div>
          <div style={{ gridColumn: "1/-1" }}>
            <div style={SS.fl}>Biological Sex</div>
            <div style={{ display: "flex", gap: 8 }}>
              {["male", "female"].map(g => (
                <button key={g} style={{ ...SS.pill(profile.gender === g), flex: 1, padding: "9px 4px", textAlign: "center", textTransform: "capitalize" }} onClick={() => setProfile(p => ({ ...p, gender: g }))}>{g}</button>
              ))}
            </div>
          </div>
        </div>

        <div style={{ marginBottom: 16 }}>
          <div style={{ ...SS.fl, marginBottom: 8 }}>Activity Level</div>
          {ACTIVITY_OPTS.map(o => (
            <div key={o.val} onClick={() => setProfile(p => ({ ...p, activity: o.val }))}
              style={{ padding: "10px 14px", borderRadius: 10, cursor: "pointer", border: `1px solid ${profile.activity === o.val ? C.sage : C.border}`, background: profile.activity === o.val ? C.sageLight : C.bg, display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6, transition: "all 0.15s" }}>
              <span style={{ fontSize: 13, fontWeight: 500, color: profile.activity === o.val ? C.sage : C.text }}>{o.label}</span>
              <span style={{ fontSize: 11, color: C.muted }}>{o.sub}</span>
            </div>
          ))}
        </div>

        <div>
          <div style={{ ...SS.fl, marginBottom: 8 }}>Fitness Goal</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
            {GOAL_OPTS.map(o => (
              <div key={o.val} onClick={() => setProfile(p => ({ ...p, fitnessGoal: o.val }))}
                style={{ padding: "11px 13px", borderRadius: 10, cursor: "pointer", border: `1px solid ${profile.fitnessGoal === o.val ? C.sage : C.border}`, background: profile.fitnessGoal === o.val ? C.sageLight : C.bg, transition: "all 0.15s" }}>
                <div style={{ fontSize: 13, fontWeight: 500, color: profile.fitnessGoal === o.val ? C.sage : C.text, marginBottom: 3 }}>{o.label}</div>
                <div style={{ fontSize: 10, color: C.muted }}>{o.sub}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {rec ? (
        <>
          <div style={{ ...SS.card, background: C.surface }}>
            <div style={SS.cardTitle}>Energy Needs · Mifflin-St Jeor</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 6 }}>
              {[{ label: "BMR", val: rec.bmr, sub: "at rest", color: C.muted }, { label: "TDEE", val: rec.tdee, sub: "maintenance", color: C.sand }, { label: "Target", val: rec.targetCals, sub: "your goal", color: C.sage }].map(item => (
                <div key={item.label} style={{ textAlign: "center", background: C.white, borderRadius: 10, padding: "13px 8px", border: `1px solid ${C.border}` }}>
                  <div style={{ fontSize: 24, ...SS.serif, color: item.color, lineHeight: 1 }}>{item.val}</div>
                  <div style={{ fontSize: 9, color: C.muted, marginTop: 4, letterSpacing: "0.08em", textTransform: "uppercase" }}>{item.label}</div>
                  <div style={{ fontSize: 9, color: C.muted }}>{item.sub}</div>
                </div>
              ))}
            </div>
            <div style={{ fontSize: 10, color: C.muted, textAlign: "center", marginTop: 6 }}>
              {rec.targetCals < rec.tdee ? `${rec.tdee - rec.targetCals} kcal deficit vs maintenance` : rec.targetCals > rec.tdee ? `${rec.targetCals - rec.tdee} kcal surplus vs maintenance` : "Matching TDEE — maintenance mode"}
            </div>
          </div>

          <div style={SS.card}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <div style={SS.cardTitle}>Recommended Macros</div>
              <div style={{ fontSize: 10, color: C.sage, display: "flex", alignItems: "center", gap: 5 }}>
                <span style={{ width: 6, height: 6, borderRadius: "50%", background: C.sage, display: "inline-block" }} />
                Auto-applied
              </div>
            </div>
            <div style={{ display: "flex", justifyContent: "space-around", marginBottom: 18 }}>
              {[{ label: "Protein", val: rec.protein, pct: rec.proteinPct, color: C.rose }, { label: "Carbs", val: rec.carbs, pct: rec.carbsPct, color: C.sand }, { label: "Fat", val: rec.fat, pct: rec.fatPct, color: C.sage }].map(m => (
                <div key={m.label} style={{ textAlign: "center" }}>
                  <div style={{ fontSize: 32, ...SS.serif, color: m.color, lineHeight: 1 }}>{m.val}g</div>
                  <div style={{ fontSize: 10, color: C.muted, marginTop: 4, letterSpacing: "0.06em", textTransform: "uppercase" }}>{m.label}</div>
                  <div style={{ fontSize: 10, color: m.color, marginTop: 2 }}>{m.pct}%</div>
                </div>
              ))}
            </div>
            <div style={{ height: 6, borderRadius: 99, overflow: "hidden", display: "flex" }}>
              <div style={{ width: `${rec.proteinPct}%`, background: C.rose, transition: "width 0.5s" }} />
              <div style={{ width: `${rec.carbsPct}%`, background: C.sand, transition: "width 0.5s" }} />
              <div style={{ width: `${rec.fatPct}%`, background: C.sage, transition: "width 0.5s" }} />
            </div>
          </div>

          <div style={{ ...SS.card, borderColor: C.sageBorder }}>
            <div style={SS.cardTitle}>The Science · {sci.title}</div>
            {sci.points.map((pt, i) => (
              <div key={i} style={{ display: "flex", gap: 12, fontSize: 12, lineHeight: 1.7, marginBottom: 10 }}>
                <span style={{ color: C.sand, fontFamily: "'Cormorant Garamond',serif", fontSize: 16, flexShrink: 0, lineHeight: 1.4 }}>0{i + 1}</span>
                <span style={{ color: C.subtle }}>{pt}</span>
              </div>
            ))}
            <div style={{ marginTop: 8, padding: "10px 14px", background: C.bg, borderRadius: 8, fontSize: 10, color: C.muted, lineHeight: 1.7 }}>
              <span style={{ color: C.sage, fontWeight: 500 }}>Sources — </span>Mifflin-St Jeor (1990) · ISSN Position Stand (2017) · Journal of Applied Physiology (2025) · Life Time Wellness Survey (Dec 2025) · ACSM Fitness Trends 2026 · USDA/NAM AMDR
            </div>
          </div>
        </>
      ) : (
        <div style={{ ...SS.card, textAlign: "center", padding: "36px 20px" }}>
          <div style={{ fontSize: 32, marginBottom: 12 }}></div>
          <div style={{ color: C.muted, fontSize: 13, lineHeight: 1.6 }}>Fill in your age, weight, and height above to generate your personalized recommendations.</div>
        </div>
      )}
    </>
  );
}

// ════════════════════════════════════════════════════════════════════════════
// MAIN APP
// ════════════════════════════════════════════════════════════════════════════
export default function WellnessTracker() {
  const today = new Date().toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });
  // ── Dark mode ─────────────────────────────────────────────────────────────
  const [darkMode, setDarkMode] = useState(() => {
    try { return localStorage.getItem("wt_darkmode") === "1"; } catch { return false; }
  });
  const toggleDark = () => setDarkMode(p => {
    const next = !p;
    try { localStorage.setItem("wt_darkmode", next ? "1" : "0"); } catch {}
    return next;
  });

  // ── Reactive palette — recomputes on dark mode toggle ────────────────────
  // Reassign module-level C and SS so all primitive components stay in sync.
  C = darkMode ? DARK : LIGHT;
  SS = {
    card:      { background: C.white, border: `1px solid ${C.border}`, borderRadius: 16, padding: "20px 22px", marginBottom: 12, boxShadow: darkMode ? "0 1px 8px rgba(0,0,0,0.2)" : "0 1px 8px rgba(28,33,40,0.04)" },
    cardTitle: { fontSize: 10, color: C.muted, letterSpacing: "0.18em", textTransform: "uppercase", marginBottom: 14, fontFamily: "'Jost',sans-serif", fontWeight: 500 },
    pill:      (on) => ({ padding: "6px 14px", borderRadius: 99, border: `1px solid ${on ? C.sage : C.border}`, background: on ? C.sageLight : "transparent", color: on ? C.sage : C.muted, cursor: "pointer", fontSize: 12, fontWeight: 500, fontFamily: "'Jost',sans-serif", transition: "all 0.2s" }),
    input:     { background: C.bg, border: `1px solid ${C.border}`, borderRadius: 10, color: C.text, padding: "10px 14px", fontSize: 13, fontFamily: "'Jost',sans-serif", outline: "none", width: "100%", boxSizing: "border-box" },
    cta:       { background: C.sage, color: "#FFFFFF", border: "none", borderRadius: 10, padding: "10px 20px", cursor: "pointer", fontWeight: 500, fontSize: 13, fontFamily: "'Jost',sans-serif", letterSpacing: "0.04em" },
    fl:        { fontSize: 10, color: C.muted, marginBottom: 5, fontFamily: "'Jost',sans-serif", letterSpacing: "0.12em", textTransform: "uppercase" },
    serif:     { fontFamily: "'Cormorant Garamond',serif", fontWeight: 300 },
    brand:     { fontFamily: "'Syncopate',sans-serif", fontWeight: 700, letterSpacing: "0.18em", textTransform: "uppercase" },
  };

  const todayDate = new Date().toISOString().split("T")[0];

  // ── Onboarding ────────────────────────────────────────────────────────────
  const [onboardingDone, setOnboardingDone] = useState(() => {
    try { localStorage.removeItem("wt_onboarded"); return false; } catch { return false; }
  });
  const completeOnboarding = () => { setOnboardingDone(true); try { localStorage.setItem("wt_onboarded", "1"); } catch {} };

  // ── Toast notifications ───────────────────────────────────────────────────
  const [toasts, setToasts] = useState([]);
  const toast = (msg, type = "success") => {
    const id = Date.now();
    setToasts(p => [...p, { id, msg, type }]);
    setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 2800);
  };

  // ── Date navigation ───────────────────────────────────────────────────────
  const [viewingDate, setViewingDate] = useState(todayDate);
  const isToday = viewingDate === todayDate;
  const viewLabel = isToday ? "Today" : new Date(viewingDate + "T12:00:00").toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
  const shiftDay = (n) => {
    const d = new Date(viewingDate + "T12:00:00");
    d.setDate(d.getDate() + n);
    const next = d.toISOString().split("T")[0];
    if (next <= todayDate) setViewingDate(next);
  };

  // ── UI state ──────────────────────────────────────────────────────────────
  const [tab, setTab] = useState("today");
  const [nutritionSubTab, setNutritionSubTab] = useState("summary");
  const [nutritionView, setNutritionView]     = useState("daily");
  const [wellnessSubTab, setWellnessSubTab] = useState("wellness");
  const [profileOpen, setProfileOpen] = useState(false);
  const [profileSection, setProfileSection] = useState("goals");
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [scoreTooltip, setScoreTooltip] = useState(false);
  const [editingMeal, setEditingMeal] = useState(null);
  const [shareOpen, setShareOpen] = useState(false);

  // ── Settings state ────────────────────────────────────────────────────────
  const [connectedApps, setConnectedApps] = useState({
    googleCalendar: true, appleHealth: false, strava: false,
    garmin: false, whoop: false, myFitnessPal: false, oura: false,
  });
  const [notifications, setNotifications] = useState({
    wellnessWindows: true, mealReminders: true, mindfulPrompt: true,
    hydrationNudges: false, weeklyInsight: true, calendarConflict: true,
    sleepReminder: false, goalProgress: true,
  });

  // ── Profile & goals ───────────────────────────────────────────────────────
  const [goals, setGoals] = useState({ protein: 150, carbs: 200, fat: 65 });
  const [profile, setProfile] = useState({ age: "", weight: "", height: "", gender: "male", activity: "moderate", fitnessGoal: "fat_loss" });
  const [unitSystem, setUnitSystem] = useState("metric");
  const [imperialWeight, setImperialWeight] = useState("");
  const [imperialFeet, setImperialFeet]     = useState("");
  const [imperialInches, setImperialInches] = useState("");

  // ── Diet state ────────────────────────────────────────────────────────────
  const [meals, setMeals]         = useState([]);
  const [mealType, setMealType]   = useState("Breakfast");
  const [searchFood, setSearchFood] = useState("");
  const [customFood, setCustomFood] = useState({ name: "", calories: "", protein: "", carbs: "", fat: "", fiber: "", sodium: "" });
  const [brandedQuery, setBrandedQuery]     = useState("");
  const [brandedResults, setBrandedResults] = useState([]);
  const [brandedLoading, setBrandedLoading] = useState(false);
  const [brandedError, setBrandedError]     = useState(null);
  const [mindfulEating, setMindfulEating] = useState(false);
  const [mindfulTimer, setMindfulTimer]   = useState(60);
  const [mindfulRunning, setMindfulRunning] = useState(false);
  const mindfulRef = useRef(null);

  // ── Wellness state ────────────────────────────────────────────────────────
  const allSelfCareIds = [...SELF_CARE_ITEMS.map(i => i.id), ...WIND_DOWN.map(i => i.id)];
  const [selfCare, setSelfCare] = useState(() => Object.fromEntries(allSelfCareIds.map(id => [id, 0])));
  const [eatingStart, setEatingStart] = useState(null);
  const [eatingEnd,   setEatingEnd]   = useState(null);

  // ── Workout & weight state ────────────────────────────────────────────────
  const [workouts, setWorkouts]             = useState([]);
  const [workoutFormOpen, setWorkoutFormOpen] = useState(false);
  const [workoutForm, setWorkoutForm]       = useState({ type: "strength", duration: "", rpe: "5", notes: "" });
  const [strengthExercises, setStrengthExercises] = useState([]); // [{id, name, sets:[{reps,weight}]}]
  const [exerciseInput, setExerciseInput]   = useState("");
  const [exerciseDropdownOpen, setExerciseDropdownOpen] = useState(false);
  const [selectedProgram, setSelectedProgram] = useState(null);
  const [swappingExercise, setSwappingExercise] = useState(null); // exId being swapped
  const [weightLog, setWeightLog]           = useState([]);
  const [weightInput, setWeightInput]       = useState("");
  const [trendRange, setTrendRange]         = useState(30);
  const [expandedWindow, setExpandedWindow] = useState(null);

  // ── Explore / Location state ──────────────────────────────────────────────
  const [locationGranted, setLocationGranted]   = useState(false);
  const [locationLoading, setLocationLoading]   = useState(false);
  const [locationError, setLocationError]       = useState(null);
  const [userCoords, setUserCoords]             = useState(null); // {lat, lng}
  const [exploreCategory, setExploreCategory]   = useState("gym");
  const [explorePlaces, setExplorePlaces]       = useState([]);
  const [explorePlacesLoading, setExplorePlacesLoading] = useState(false);

  // ── Calendar state ────────────────────────────────────────────────────────
  const [events, setEvents]               = useState([]);
  const [eventsLoading, setEventsLoading] = useState(false);
  const [calWriting, setCalWriting]       = useState(null);

  // ── Static data (initialized once) ───────────────────────────────────────
  const [weekData]   = useState(makeWeekData);
  const [history90]  = useState(make90DayHistory);

  // ── Conversions ───────────────────────────────────────────────────────────
  const lbsToKg  = lb  => (parseFloat(lb) * 0.453592).toFixed(1);
  const kgToLbs  = kg  => (parseFloat(kg) * 2.20462).toFixed(1);
  const cmToFtIn = cm  => { const ti = parseFloat(cm) / 2.54; return { ft: Math.floor(ti / 12), inc: Math.round(ti % 12) }; };
  const ftInToCm = (ft, inc) => Math.round((parseFloat(ft || 0) * 12 + parseFloat(inc || 0)) * 2.54);
  const switchToImperial = () => {
    if (profile.weight) setImperialWeight(kgToLbs(profile.weight));
    if (profile.height) { const { ft, inc } = cmToFtIn(profile.height); setImperialFeet(String(ft)); setImperialInches(String(inc)); }
    setUnitSystem("imperial");
  };
  const switchToMetric = () => {
    if (imperialWeight) setProfile(p => ({ ...p, weight: lbsToKg(imperialWeight) }));
    if (imperialFeet || imperialInches) setProfile(p => ({ ...p, height: String(ftInToCm(imperialFeet, imperialInches)) }));
    setUnitSystem("metric");
  };

  // ── localStorage persistence ──────────────────────────────────────────────
  // Load persisted data on mount
  useEffect(() => {
    try {
      const saved = localStorage.getItem("wt_data");
      if (!saved) return;
      const d = JSON.parse(saved);
      const savedDate = d.date;
      if (d.goals)    setGoals(d.goals);
      if (d.profile)  setProfile(d.profile);
      if (d.unitSystem) setUnitSystem(d.unitSystem);
      if (d.weightLog) setWeightLog(d.weightLog);
      // Only restore daily logs if they're from today
      if (savedDate === todayDate) {
        if (d.meals)    setMeals(d.meals);
        if (d.selfCare) setSelfCare(d.selfCare);
        if (d.workouts) setWorkouts(d.workouts);
        if (d.eatingStart) setEatingStart(d.eatingStart);
        if (d.eatingEnd)   setEatingEnd(d.eatingEnd);
      }
    } catch {}
  }, []);

  // Save to localStorage whenever key state changes
  useEffect(() => {
    try {
      localStorage.setItem("wt_data", JSON.stringify({
        date: todayDate, goals, profile, unitSystem,
        meals, selfCare, workouts, weightLog, eatingStart, eatingEnd,
      }));
    } catch {}
  }, [goals, profile, unitSystem, meals, selfCare, workouts, weightLog, eatingStart, eatingEnd]);

  // ── Derived values (order matters: goals → calGoal → totals → streaks) ───
  const rec = computeRec(profile);

  // Sync rec → goals
  useEffect(() => {
    if (rec) setGoals({ protein: rec.protein, carbs: rec.carbs, fat: rec.fat });
  }, [rec?.protein, rec?.carbs, rec?.fat]);

  const calGoal = goals.protein * 4 + goals.carbs * 4 + goals.fat * 9;

  const totals = meals.reduce(
    (a, m) => ({ calories: a.calories + m.calories, protein: a.protein + m.protein, carbs: a.carbs + m.carbs, fat: a.fat + m.fat, fiber: a.fiber + (m.fiber || 0), sodium: a.sodium + (m.sodium || 0) }),
    { calories: 0, protein: 0, carbs: 0, fat: 0, fiber: 0, sodium: 0 }
  );

  const selfCareScore = Math.round(
    SELF_CARE_ITEMS.reduce((a, item) => a + Math.min(selfCare[item.id] / item.target, 1), 0) / SELF_CARE_ITEMS.length * 100
  );

  // Streaks — computed after totals and calGoal are available
  const streaks = {
    nutrition:   history90.slice(0, 89).reduce((s, d, i, arr) => { if (i === arr.length - 1 - s && d.streakNutrition) return s + 1; return s; }, 0) + (totals.calories > calGoal * 0.7 ? 1 : 0),
    movement:    (() => { let s = 0; for (let i = history90.length - 2; i >= 0; i--) { if (history90[i].streakMovement) s++; else break; } return s + (workouts.length > 0 ? 1 : 0); })(),
    mindfulness: (() => { let s = 0; for (let i = history90.length - 2; i >= 0; i--) { if (history90[i].streakMindfulness) s++; else break; } return s + (selfCare.meditation > 0 ? 1 : 0); })(),
    sleep:       history90.slice(80, 89).filter(d => d.sleep >= 7).length,
  };

  // ── Eating window ─────────────────────────────────────────────────────────
  const logMeal = (food) => {
    const now = new Date().toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit" });
    if (!eatingStart) setEatingStart(now);
    setEatingEnd(now);
    setMeals(p => [...p, { ...food, id: Date.now(), mealType }]);
    setSearchFood("");
    toast(`${food.name} logged`);
  };
  const deleteMeal = (id) => { setMeals(p => p.filter(x => x.id !== id)); toast("Entry removed", "info"); };
  const editMealCalories = (id, val) => setMeals(p => p.map(m => m.id === id ? { ...m, calories: +val || m.calories } : m));

  const ewHours = (() => {
    if (!eatingStart || !eatingEnd) return null;
    const parse = t => { const [h, m] = t.replace(/ AM| PM/g, "").split(":").map(Number); return h * 60 + m; };
    return Math.round((parse(eatingEnd) - parse(eatingStart)) / 6) / 10;
  })();

  // ── Branded food search via Anthropic API + web search ───────────────────
  const searchBrandedFood = async (query) => {
    if (!query.trim()) return;
    setBrandedLoading(true);
    setBrandedError(null);
    setBrandedResults([]);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1500,
          tools: [{ type: "web_search_20250305", name: "web_search" }],
          tool_choice: { type: "auto" },

      if (!exerciseInput.trim()) return;
      setStrengthExercises(p => [...p, { id: Date.now(), name: exerciseInput.trim(), sets: [] }]);
      setExerciseInput("");
    };
    const addSet = (exId) => {
      setStrengthExercises(p => p.map(ex => ex.id === exId
        ? { ...ex, sets: [...ex.sets, { id: Date.now(), reps: "", weight: "" }] }
        : ex
      ));
    };
    const updateSet = (exId, setId, field, val) => {
      setStrengthExercises(p => p.map(ex => ex.id === exId
        ? { ...ex, sets: ex.sets.map(s => s.id === setId ? { ...s, [field]: val } : s) }
        : ex
      ));
    };
    const removeSet = (exId, setId) => {
      setStrengthExercises(p => p.map(ex => ex.id === exId
        ? { ...ex, sets: ex.sets.filter(s => s.id !== setId) }
        : ex
      ));
    };
    const removeExercise = (exId) => setStrengthExercises(p => p.filter(ex => ex.id !== exId));
    const swapExercise = (exId, newName) => {
      setStrengthExercises(p => p.map(ex => ex.id === exId ? { ...ex, name: newName } : ex));
      setSwappingExercise(null);
      toast(`Swapped to ${newName}`);

      const group = EXERCISE_DB.find(e => e.name === name)?.group;

      return EXERCISE_DB.filter(e => e.group === group && e.name !== name);

      if (!workoutForm.duration) return;
      const time = new Date().toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit" });
      const exercises = workoutForm.type === "strength" ? strengthExercises : [];

      setSelfCare(p => ({ ...p, exercise: p.exercise + 1 }));
      setWorkoutForm({ type: "strength", duration: "", rpe: "5", notes: "" });
      setStrengthExercises([]);
      setExerciseInput("");
      setSelectedProgram(null);
      setWorkoutFormOpen(false);
      toast("Workout saved");
    };

    const SubTabs = () => (
      <div style={{ display: "flex", background: C.white, border: `1px solid ${C.border}`, borderRadius: 12, padding: 4, marginBottom: 16, gap: 4 }}>

      </div>
    );

    // ── WELLNESS sub-tab ──
    if (wellnessSubTab === "wellness") return (
      <>
        <SubTabs />
        <div style={SS.card}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18 }}>
            <div style={SS.cardTitle}>Daily Practice</div>
            <div style={{ background: selfCareScore > 70 ? C.sageLight : C.sandLight, color: selfCareScore > 70 ? C.sage : C.sand, fontFamily: "'Cormorant Garamond',serif", fontSize: 18, padding: "3px 14px", borderRadius: 99, border: `1px solid ${selfCareScore > 70 ? C.sageBorder : C.sandBorder}` }}>{selfCareScore}%</div>
          </div>
          {SELF_CARE_ITEMS.map(item => (
            <div key={item.id} style={{ marginBottom: 16 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 7 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <div>
                    <div style={{ fontWeight: 500, fontSize: 13 }}>{item.label}</div>
                    <div style={{ fontSize: 11, color: C.muted }}>Goal: {item.target} {item.unit}</div>
                  </div>
                </div>
                <Stepper value={selfCare[item.id]} onChange={v => setSelfCare(p => ({ ...p, [item.id]: v }))} max={item.target * 2} />
              </div>
              <Bar value={selfCare[item.id]} max={item.target} color={selfCare[item.id] >= item.target ? C.sage : selfCare[item.id] > 0 ? C.sand : C.border} height={3} />
            </div>
          ))}
        </div>

        <div style={SS.card}>
          <div style={SS.cardTitle}>Evening Wind-Down</div>
          <div style={{ fontSize: 12, color: C.muted, marginBottom: 14, lineHeight: 1.6 }}>A consistent wind-down routine signals your nervous system to begin melatonin production. New research (Nutrition Reviews, 2025) also shows dietary fiber supports healthy sleep via the gut–brain axis — another reason your earlier food choices matter.</div>
          {WIND_DOWN.map((item, i) => {
            const done = selfCare[item.id] > 0;
            return (
              <div key={item.id} onClick={() => setSelfCare(p => ({ ...p, [item.id]: done ? 0 : 1 }))}
                style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 0", borderBottom: i < WIND_DOWN.length - 1 ? `1px solid ${C.border}` : "none", cursor: "pointer" }}>
                <div style={{ width: 18, height: 18, borderRadius: 5, border: `1.5px solid ${done ? C.sage : C.border}`, background: done ? C.sage : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, transition: "all 0.2s" }}>
                  {done && <span style={{ color: C.white, fontSize: 11 }}>✓</span>}
                </div>
                <span style={{ fontSize: 13, color: done ? C.muted : C.text, textDecoration: done ? "line-through" : "none" }}>{item.label}</span>
              </div>
            );
          })}
        </div>

        <div style={{ ...SS.card, borderColor: C.sandBorder, background: C.sandLight }}>
          <div style={SS.cardTitle}>Rest & Recovery</div>
          <div style={{ fontSize: 13, color: C.subtle, lineHeight: 1.7 }}>Rest is an active part of health — not the absence of effort. Muscles rebuild during recovery, cortisol resets with sleep, and the nervous system heals through stillness.</div>
          <button onClick={() => setSelfCare(p => ({ ...p, exercise: Math.max(p.exercise, 1) }))} style={{ ...SS.cta, background: C.sand, marginTop: 14, fontSize: 12 }}>Log Rest Day ✓</button>
        </div>
      </>
    );

    // ── LOG WORKOUT sub-tab ──
    const splits = [...new Set(WORKOUT_PROGRAMS.map(p => p.split))];
    const SPLIT_META = {
      "Push Pull Legs":  { who: "Intermediate · 3–6 days/week",         note: "Groups muscles by movement — push, pull, and legs on separate days" },
      "Upper Lower":     { who: "Beginner–Intermediate · 4 days/week",   note: "Splits body into two halves trained on alternating days" },
      "Bro Split":       { who: "Intermediate · 5 days/week",            note: "One muscle group per day — high volume, full focus" },
      "Female Focused":  { who: "All levels · 3–4 days/week",            note: "Emphasis on glutes, hamstrings, and full-body compound lifts" },
    };
    const loadProgram = (prog) => {
      setSelectedProgram(prog.id);
      setStrengthExercises(prog.exercises.map((ex, i) => ({
        id: Date.now() + i,
        name: ex.name,
        sets: Array.from({ length: ex.defaultSets }, (_, si) => ({ id: Date.now() + i * 100 + si, reps: "", weight: "" })),
      })));
    };
    const clearProgram = () => { setSelectedProgram(null); setStrengthExercises([]); };
    const activeProgram = WORKOUT_PROGRAMS.find(p => p.id === selectedProgram);

    return (
      <>
        <SubTabs />

        {/* ── STEP 1: TYPE ──────────────────────────────────────────────────── */}
        <div style={SS.card}>
          <div style={SS.cardTitle}>What are you doing today?</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
            {WORKOUT_TYPES.map(wt => (
              <button key={wt.val}
                onClick={() => { setWorkoutForm(p => ({ ...p, type: wt.val })); if (wt.val !== "strength") { setSelectedProgram(null); setStrengthExercises([]); } }}
                style={{ ...SS.pill(workoutForm.type === wt.val), fontSize: 12, padding: "8px 16px" }}>
                {wt.label}
              </button>
            ))}
          </div>
        </div>

        {/* ── STEP 2 (strength): PROGRAM PICKER — collapses after selection ── */}
        {workoutForm.type === "strength" && (
          <div style={SS.card}>
            {activeProgram ? (
              /* Collapsed — just shows badge + Change button */
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <div style={{ fontSize: 10, color: C.muted, letterSpacing: "0.14em", textTransform: "uppercase", marginBottom: 4 }}>Program</div>
                  <div style={{ fontSize: 14, fontWeight: 500, color: C.text }}>{activeProgram.label}</div>
                  <div style={{ fontSize: 11, color: C.muted, marginTop: 2 }}>{activeProgram.split} · {activeProgram.desc}</div>
                </div>
                <button onClick={clearProgram}
                  style={{ background: "none", border: `1px solid ${C.border}`, borderRadius: 8, color: C.muted, fontSize: 11, padding: "6px 12px", cursor: "pointer", whiteSpace: "nowrap", marginLeft: 12 }}>
                  Change
                </button>
              </div>
            ) : (
              /* Expanded picker */
              <>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                  <div style={SS.cardTitle}>Choose a Program</div>
                  <button onClick={() => setSelectedProgram("custom")}
                    style={{ background: "none", border: "none", color: C.sage, fontSize: 12, cursor: "pointer", fontFamily: "'Jost',sans-serif", fontWeight: 500 }}>
                    Skip → Custom
                  </button>
                </div>
                <div style={{ fontSize: 11, color: C.muted, marginBottom: 16, lineHeight: 1.5 }}>
                  Pick a day to pre-load your exercises, or go custom to build from scratch.
                </div>
                {splits.map(split => {
                  const meta = SPLIT_META[split] || {};
                  return (
                    <div key={split} style={{ marginBottom: 20 }}>
                      <div style={{ marginBottom: 8 }}>
                        <div style={{ fontSize: 12, fontWeight: 600, color: C.text }}>{split}</div>
                        <div style={{ fontSize: 10, color: C.sage }}>{meta.who}</div>
                        <div style={{ fontSize: 10, color: C.muted, marginTop: 1 }}>{meta.note}</div>
                      </div>
                      <div style={{ display: "flex", flexWrap: "wrap", gap: 7 }}>
                        {WORKOUT_PROGRAMS.filter(p => p.split === split).map(prog => (
                          <button key={prog.id} onClick={() => loadProgram(prog)}
                            style={{ padding: "9px 14px", borderRadius: 10, border: `1px solid ${C.border}`, background: C.white, color: C.text, cursor: "pointer", textAlign: "left", transition: "all 0.15s" }}
                            onMouseEnter={e => { e.currentTarget.style.borderColor = C.sage; e.currentTarget.style.background = C.sageLight; }}
                            onMouseLeave={e => { e.currentTarget.style.borderColor = C.border; e.currentTarget.style.background = C.white; }}>
                            <div style={{ fontSize: 12, fontWeight: 500 }}>{prog.label}</div>
                            <div style={{ fontSize: 10, color: C.muted, marginTop: 2 }}>{prog.desc}</div>
                          </button>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </>
            )}
          </div>
        )}

        {/* ── STEP 3 (strength): EXERCISES ─────────────────────────────────── */}
        {workoutForm.type === "strength" && (activeProgram || selectedProgram === "custom") && (
          <div style={SS.card}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
              <div style={SS.cardTitle}>
                {activeProgram ? `${activeProgram.label} · ${strengthExercises.length} exercises` : "Your Exercises"}
              </div>
            </div>

            {/* Autocomplete search */}
            <div style={{ position: "relative", marginBottom: 16 }}>
              <div style={{ display: "flex", gap: 8 }}>
                <input style={{ ...SS.input, flex: 1 }} placeholder="Search to add an exercise…" value={exerciseInput}
                  onChange={e => { setExerciseInput(e.target.value); setExerciseDropdownOpen(true); }}
                  onFocus={() => setExerciseDropdownOpen(true)}
                  onBlur={() => setTimeout(() => setExerciseDropdownOpen(false), 150)}
                  onKeyDown={e => { if (e.key === "Enter") { addExercise(); setExerciseDropdownOpen(false); } if (e.key === "Escape") setExerciseDropdownOpen(false); }} />
                <button style={{ ...SS.cta, padding: "10px 16px", whiteSpace: "nowrap" }} onClick={() => { addExercise(); setExerciseDropdownOpen(false); }}>+ Add</button>
              </div>
              {exerciseDropdownOpen && exerciseInput.length > 0 && (() => {
                const q = exerciseInput.toLowerCase();
                const matches = EXERCISE_DB.filter(e => e.name.toLowerCase().includes(q)).slice(0, 7);
                if (!matches.length) return null;
                return (
                  <div style={{ position: "absolute", top: "100%", left: 0, right: 0, zIndex: 50, background: C.white, border: `1px solid ${C.border}`, borderRadius: 12, boxShadow: darkMode ? "0 6px 28px rgba(0,0,0,0.4)" : "0 6px 28px rgba(28,33,40,0.13)", marginTop: 4, overflow: "hidden" }}>
                    {matches.map((ex, i) => (
                      <div key={i} onMouseDown={() => { setStrengthExercises(p => [...p, { id: Date.now() + i, name: ex.name, sets: [] }]); setExerciseInput(""); setExerciseDropdownOpen(false); }}
                        style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "11px 14px", cursor: "pointer", borderBottom: i < matches.length - 1 ? `1px solid ${C.border}` : "none" }}
                        onMouseEnter={e => e.currentTarget.style.background = C.surface}
                        onMouseLeave={e => e.currentTarget.style.background = C.white}>
                        <span style={{ fontSize: 13, color: C.text }}>{ex.name}</span>
                        <span style={{ fontSize: 10, color: C.muted, background: C.surface, borderRadius: 99, padding: "2px 8px", marginLeft: 8, whiteSpace: "nowrap" }}>{ex.group}</span>
                      </div>
                    ))}
                  </div>
                );
              })()}
            </div>

            {strengthExercises.length === 0 && (
              <div style={{ textAlign: "center", color: C.muted, fontSize: 12, padding: "16px 0" }}>
                No exercises yet — search above to add one.
              </div>
            )}

            {strengthExercises.map(ex => {
              const isSwapping = swappingExercise === ex.id;
              const similar = isSwapping ? getSimilar(ex.name) : [];
              return (
              <div key={ex.id} style={{ marginBottom: 14, border: `1px solid ${isSwapping ? C.sageBorder : C.border}`, borderRadius: 14, overflow: "hidden", transition: "border-color 0.2s" }}>
                {/* Exercise header bar */}
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "11px 14px", background: isSwapping ? C.sageLight : C.surface }}>
                  <div>
                    <span style={{ fontSize: 13, fontWeight: 600, color: C.text }}>{ex.name}</span>
                    {(() => {
                      const group = EXERCISE_DB.find(e => e.name === ex.name)?.group;
                      return group ? <span style={{ fontSize: 10, color: C.muted, marginLeft: 8 }}>{group}</span> : null;
                    })()}
                  </div>
                  <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                    <button onClick={() => setSwappingExercise(isSwapping ? null : ex.id)}
                      style={{ background: isSwapping ? C.sage : "none", border: `1px solid ${isSwapping ? C.sage : C.border}`, color: isSwapping ? "#fff" : C.muted, cursor: "pointer", fontSize: 11, padding: "4px 10px", borderRadius: 6, fontFamily: "'Jost',sans-serif", fontWeight: 500, transition: "all 0.15s" }}>
                      {isSwapping ? "Cancel" : "Swap"}
                    </button>
                    <button onClick={() => removeExercise(ex.id)}
                      style={{ background: "none", border: "none", color: C.muted, cursor: "pointer", fontSize: 11, padding: "4px 8px", borderRadius: 6, fontFamily: "'Jost',sans-serif" }}>
                      Remove
                    </button>
                  </div>
                </div>

                {/* Swap panel — inline, slides open */}
                {isSwapping && (
                  <div style={{ padding: "12px 14px", borderBottom: `1px solid ${C.border}`, background: C.white }}>
                    <div style={{ fontSize: 10, color: C.sage, letterSpacing: "0.14em", textTransform: "uppercase", fontWeight: 500, marginBottom: 10, fontFamily: "'Jost',sans-serif" }}>
                      Similar exercises — same muscle group
                    </div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                      {similar.length === 0 ? (
                        <div style={{ fontSize: 12, color: C.muted, padding: "6px 0" }}>No similar exercises found.</div>
                      ) : similar.map((s, i) => (
                        <button key={i} onClick={() => swapExercise(ex.id, s.name)}
                          style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "9px 12px", background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, cursor: "pointer", textAlign: "left", width: "100%", transition: "all 0.15s", fontFamily: "'Jost',sans-serif" }}
                          onMouseEnter={e => { e.currentTarget.style.background = C.sageLight; e.currentTarget.style.borderColor = C.sageBorder; }}
                          onMouseLeave={e => { e.currentTarget.style.background = C.surface; e.currentTarget.style.borderColor = C.border; }}>
                          <span style={{ fontSize: 12, fontWeight: 500, color: C.text }}>{s.name}</span>
                          <span style={{ fontSize: 10, color: C.sage, fontWeight: 500 }}>Use this →</span>
                        </button>
                      ))}
                    </div>
                  </div>
                )}

                {/* Column headers */}
                {ex.sets.length > 0 && (
                  <div style={{ display: "grid", gridTemplateColumns: "32px 1fr 1fr 40px", gap: 6, padding: "8px 14px 4px", borderBottom: `1px solid ${C.border}` }}>
                    <div style={{ fontSize: 9, color: C.muted, letterSpacing: "0.1em", textTransform: "uppercase", textAlign: "center" }}>Set</div>
                    <div style={{ fontSize: 9, color: C.muted, letterSpacing: "0.1em", textTransform: "uppercase" }}>Weight (lbs)</div>
                    <div style={{ fontSize: 9, color: C.muted, letterSpacing: "0.1em", textTransform: "uppercase" }}>Reps</div>
                    <div />
                  </div>
                )}

                <div style={{ padding: "8px 14px 12px" }}>
                  {ex.sets.map((s, si) => (
                    <div key={s.id} style={{ display: "grid", gridTemplateColumns: "32px 1fr 1fr 40px", gap: 6, alignItems: "center", marginBottom: 6 }}>
                      <div style={{ fontSize: 12, color: C.muted, textAlign: "center", fontWeight: 600 }}>{si + 1}</div>
                      <div style={{ position: "relative" }}>
                        <input type="number" placeholder="135" value={s.weight}
                          onChange={e => updateSet(ex.id, s.id, "weight", e.target.value)}
                          style={{ ...SS.input, padding: "9px 34px 9px 12px", fontSize: 14, fontWeight: 500 }} />
                        <span style={{ position: "absolute", right: 8, top: "50%", transform: "translateY(-50%)", fontSize: 10, color: C.muted, pointerEvents: "none" }}>lbs</span>
                      </div>
                      <div style={{ position: "relative" }}>
                        <input type="number" placeholder="8" value={s.reps}
                          onChange={e => updateSet(ex.id, s.id, "reps", e.target.value)}
                          style={{ ...SS.input, padding: "9px 34px 9px 12px", fontSize: 14, fontWeight: 500 }} />
                        <span style={{ position: "absolute", right: 8, top: "50%", transform: "translateY(-50%)", fontSize: 10, color: C.muted, pointerEvents: "none" }}>reps</span>
                      </div>
                      <button onClick={() => removeSet(ex.id, s.id)}
                        style={{ width: 32, height: 32, border: `1px solid ${C.border}`, borderRadius: 8, background: C.white, color: C.muted, cursor: "pointer", fontSize: 15, display: "flex", alignItems: "center", justifyContent: "center", transition: "all 0.15s" }}
                        onMouseEnter={e => { e.currentTarget.style.borderColor = C.rose; e.currentTarget.style.color = C.rose; }}
                        onMouseLeave={e => { e.currentTarget.style.borderColor = C.border; e.currentTarget.style.color = C.muted; }}>
                        ×
                      </button>
                    </div>
                  ))}
                  <button onClick={() => addSet(ex.id)}
                    style={{ marginTop: 4, padding: "7px 14px", background: "transparent", border: `1px dashed ${C.sageBorder}`, borderRadius: 8, color: C.sage, fontSize: 12, cursor: "pointer", fontFamily: "'Jost',sans-serif", fontWeight: 500, display: "flex", alignItems: "center", gap: 6 }}>
                    <span style={{ fontSize: 16, lineHeight: 1 }}>+</span> Add Set
                  </button>
                </div>
              </div>
              );
            })}
          </div>
        )}

        {/* ── STEP 4: SESSION DETAILS + SAVE (footer) ──────────────────────── */}
        <div style={SS.card}>
          <div style={SS.cardTitle}>Session Details</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 14 }}>
            <div>
              <div style={SS.fl}>Duration (min)</div>
              <input style={SS.input} type="number" placeholder="45" value={workoutForm.duration}
                onChange={e => setWorkoutForm(p => ({ ...p, duration: e.target.value }))} />
            </div>
            <div>
              <div style={SS.fl}>Effort (RPE 1–10)</div>
              <input style={SS.input} type="number" min="1" max="10" placeholder="7" value={workoutForm.rpe}
                onChange={e => setWorkoutForm(p => ({ ...p, rpe: e.target.value }))} />
              {workoutForm.rpe && <div style={{ fontSize: 10, color: C.sage, marginTop: 4 }}>{RPE_LABELS[Math.min(10, Math.max(1, +workoutForm.rpe))]}</div>}
            </div>
            <div style={{ gridColumn: "1/-1" }}>
              <div style={SS.fl}>Notes (optional)</div>
              <input style={SS.input} placeholder="How did it feel? Any PRs?" value={workoutForm.notes}
                onChange={e => setWorkoutForm(p => ({ ...p, notes: e.target.value }))} />
            </div>
          </div>
          <div style={{ display: "flex", gap: 10 }}>
            <button style={{ ...SS.cta, flex: 1, padding: "12px 0", fontSize: 14 }} onClick={saveWorkout}>Save Workout</button>
            <button onClick={() => { setWorkoutForm({ type: "strength", duration: "", rpe: "5", notes: "" }); setStrengthExercises([]); setExerciseInput(""); setSelectedProgram(null); }}
              style={{ padding: "12px 16px", border: `1px solid ${C.border}`, borderRadius: 10, background: "transparent", color: C.muted, cursor: "pointer", fontSize: 13, fontFamily: "'Jost',sans-serif" }}>
              Clear
            </button>
          </div>
        </div>



        {/* Today's logged workouts */}
        {workouts.length > 0 && (
          <div style={{ ...SS.card, marginTop: 12 }}>
            <div style={SS.cardTitle}>Today's Workouts</div>
            {workouts.map(w => (
              <div key={w.id} style={{ padding: "12px 0", borderBottom: `1px solid ${C.border}` }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                  <div>
                    <div style={{ fontSize: 13, fontWeight: 500 }}>{WORKOUT_TYPES.find(t => t.val === w.type)?.label}</div>
                    <div style={{ fontSize: 11, color: C.muted, marginTop: 2 }}>{w.time} · {w.duration} min · RPE {w.rpe}/10{w.notes ? ` · ${w.notes}` : ""}</div>
                  </div>
                  <button onClick={() => setWorkouts(p => p.filter(x => x.id !== w.id))} style={{ background: "none", border: "none", color: C.rose, cursor: "pointer", fontSize: 16, padding: 0 }}>×</button>
                </div>
                {w.exercises && w.exercises.length > 0 && (
                  <div style={{ marginTop: 10, display: "flex", flexDirection: "column", gap: 6 }}>
                    {w.exercises.map(ex => (
                      <div key={ex.id} style={{ background: C.surface, borderRadius: 8, padding: "8px 12px" }}>
                        <div style={{ fontSize: 12, fontWeight: 500, color: C.text, marginBottom: 4 }}>{ex.name}</div>
                        <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                          {ex.sets.map((s, i) => (
                            <span key={s.id} style={{ fontSize: 10, color: C.subtle, background: C.white, border: `1px solid ${C.border}`, borderRadius: 6, padding: "2px 8px" }}>
                              Set {i + 1}: {s.weight || "—"}lbs × {s.reps || "—"}
                            </span>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            ))}
          </div>
        )}
      </>
    );
  };

  // ════════════════════════════════════════════════════════════
  // ════════════════════════════════════════════════════════════
  // EXPLORE TAB
  // ════════════════════════════════════════════════════════════
  const renderExplore = () => (
    <>
      {/* Location permission gate */}
      {!locationGranted ? (
        <div style={{ ...SS.card, textAlign: "center", padding: "36px 24px" }}>
          <div style={{ width: 52, height: 52, borderRadius: "50%", background: C.sageLight, border: `1px solid ${C.sageBorder}`, display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 20, margin: "0 auto 20px" }}><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={C.sage} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></div>
          <div style={{ fontSize: 22, ...SS.serif, color: C.text, marginBottom: 8 }}>Discover Local Wellness</div>
          <div style={{ fontSize: 13, color: C.muted, lineHeight: 1.8, maxWidth: 300, margin: "0 auto 24px" }}>
            Find gyms, spas, cold plunge, juice bars, health restaurants, and more — all near you, right now.
          </div>
          {locationError && (
            <div style={{ padding: "12px 16px", background: "#FFF0F0", border: "1px solid #F5C0C0", borderRadius: 10, fontSize: 12, color: C.rose, marginBottom: 16, textAlign: "left" }}>
              {locationError}
            </div>
          )}
          <button onClick={requestLocation} disabled={locationLoading}
            style={{ ...SS.cta, fontSize: 14, padding: "13px 32px", opacity: locationLoading ? 0.7 : 1 }}>
            {locationLoading ? "Getting your location…" : "Allow Location Access"}
          </button>
          <div style={{ fontSize: 10, color: C.muted, marginTop: 12, lineHeight: 1.6 }}>
            Your location is only used to find nearby places and is never stored or shared.
          </div>
        </div>
      ) : (
        <>
          {/* Category pills */}
          <div style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 10, color: C.muted, letterSpacing: "0.14em", textTransform: "uppercase", marginBottom: 10, fontFamily: "'Jost',sans-serif" }}>What are you looking for?</div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
              {EXPLORE_CATEGORIES.map(cat => {
                const isActive = exploreCategory === cat.id;
                return (
                  <button key={cat.id}

    return (
      <>
        {/* Habit Streaks */}

          <div style={SS.cardTitle}>Habit Streaks</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 10 }}>

          </div>
        </div>

        {/* Weight Log */}
        <div style={SS.card}>
          <div style={SS.cardTitle}>Weight Log</div>

              if (!weightInput) return;
              const kg = unitSystem === "imperial" ? (parseFloat(weightInput) * 0.453592).toFixed(1) : weightInput;
              setWeightLog(p => [...p, { date: new Date().toLocaleDateString("en-US", { month: "short", day: "numeric" }), kg: parseFloat(kg), display: weightInput, unit: unitSystem === "metric" ? "kg" : "lbs" }]);
              setWeightInput("");

            <div>
              {[...weightLog].reverse().slice(0, 5).map((w, i) => (
                <div key={i} style={{ display: "flex", justifyContent: "space-between", fontSize: 12, padding: "6px 0", borderBottom: `1px solid ${C.border}` }}>

                  <span style={{ color: C.text, fontWeight: 500 }}>{w.display} {w.unit}</span>

          <div style={{ marginBottom: 20 }}>

        </div>

        {/* This week summary */}
        <div style={SS.card}>
          <div style={SS.cardTitle}>This Week</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>

          <div style={SS.cardTitle}>Daily Pattern</div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 6 }}>
            {weekData.map((day, i) => (
              <div key={i} style={{ textAlign: "center" }}>

                <div style={{ fontSize: 9, color: C.muted, marginTop: 3 }}>{day.sleep}h</div>
              </div>

          </div>
          <div style={{ display: "flex", gap: 14, marginTop: 14, paddingTop: 12, borderTop: `1px solid ${C.border}` }}>
            {[{ c: C.rose, l: "Nutrition" }, { c: C.sage, l: "Movement" }, { c: C.sand, l: "Mindfulness" }].map(l => (
              <div key={l.l} style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 10, color: C.muted }}>
                <div style={{ width: 8, height: 8, borderRadius: "50%", background: l.c }} />{l.l}

        </div>

        <div style={{ ...SS.card, borderColor: C.sageBorder }}>
          <div style={SS.cardTitle}>Weekly Insight</div>
          <div style={{ fontSize: 13, color: C.subtle, lineHeight: 1.8, marginBottom: 12 }}>
            {mDays >= 5 ? "Strong movement week — your consistency is building real metabolic benefit. Research shows 5+ active days significantly reduces cardiovascular risk and improves mood regulation."

              : "This week is a chance to rebuild momentum. Even a 10-minute walk counts — consistency over perfection is the research-backed approach to lasting change."}

          <div style={{ padding: "10px 14px", background: C.bg, borderRadius: 8, fontSize: 10, color: C.muted, lineHeight: 1.6 }}>

          </div>
        </div>
      </>
    );
  };

        </div>
      </div>
    </div>
  );

  // ════════════════════════════════════════════════════════════
  // RENDER
  // ════════════════════════════════════════════════════════════
  return (
    <>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Jost:wght@300;400;500;600&family=Syncopate:wght@400;700&display=swap');
        * { box-sizing: border-box; } body { margin: 0; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #FAF8F5; }
        ::-webkit-scrollbar-thumb { background: #EDE9E3; border-radius: 4px; }
        input[type=range] { -webkit-appearance: none; height: 3px; border-radius: 99px; background: #EDE9E3; outline: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #B06A3A; cursor: pointer; box-shadow: 0 1px 4px rgba(176,106,58,0.3); }

        @keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }
      `}</style>

      {/* ── ONBOARDING OVERLAY ─────────────────────────────────────────────── */}
      {!onboardingDone && (
        <div style={{ position: "fixed", inset: 0, zIndex: 500, background: C.bg, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 32, animation: "fadeIn 0.4s ease" }}>

          {/* Aela mark + wordmark */}
          <div style={{ marginBottom: 28, textAlign: "center", display: "flex", flexDirection: "column", alignItems: "center", gap: 16 }}>
            <svg width="52" height="60" viewBox="0 0 80 90" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M40 4 L6 86" stroke={C.text} strokeWidth="5.5" strokeLinecap="round"/>
              <path d="M40 4 L74 86" stroke={C.text} strokeWidth="5.5" strokeLinecap="round"/>
              <path d="M22 52 Q40 38 58 52" stroke={C.sage} strokeWidth="4" strokeLinecap="round" fill="none"/>
              <circle cx="22" cy="52" r="2.5" fill={C.sage}/>
              <circle cx="58" cy="52" r="2.5" fill={C.sage}/>
            </svg>
            <div>
              <div style={{ fontSize: 42, fontFamily: "'Syncopate',sans-serif", fontWeight: 700, color: C.text, letterSpacing: "0.22em", textTransform: "uppercase", lineHeight: 1 }}>AELA</div>
              <div style={{ fontSize: 11, color: C.sage, letterSpacing: "0.28em", textTransform: "uppercase", fontFamily: "'Jost',sans-serif", fontWeight: 500, marginTop: 10 }}>Built for the long game</div>
            </div>
          </div>

          <div style={{ width: 40, height: 1, background: C.border, marginBottom: 28 }} />

          <div style={{ fontSize: 14, color: C.muted, textAlign: "center", lineHeight: 1.9, maxWidth: 300, marginBottom: 36 }}>

          </div>

          <div style={{ width: "100%", maxWidth: 340, display: "flex", flexDirection: "column", gap: 10, marginBottom: 36 }}>
            {[
              { step: "1", title: "Build your profile", desc: "Enter your stats and Aela calculates your exact calorie and macro targets based on your goal." },
              { step: "2", title: "Log what you eat", desc: "Track meals with fiber, sodium, and full macros. Your eating window starts automatically." },
              { step: "3", title: "Track your training", desc: "Log workouts with sets, reps and weight. Choose from PPL, Upper Lower, and more." },
            ].map(s => (
              <div key={s.step} style={{ background: C.white, border: `1px solid ${C.border}`, borderRadius: 14, padding: "14px 18px", display: "flex", gap: 14, alignItems: "flex-start" }}>
                <div style={{ width: 26, height: 26, borderRadius: "50%", background: C.sage, color: C.white, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 600, flexShrink: 0, fontFamily: "'Jost',sans-serif" }}>{s.step}</div>
                <div>
                  <div style={{ fontSize: 13, fontWeight: 600, color: C.text, marginBottom: 3 }}>{s.title}</div>
                  <div style={{ fontSize: 11, color: C.muted, lineHeight: 1.6 }}>{s.desc}</div>
                </div>
              </div>
            ))}
          </div>

          <button style={{ ...SS.cta, fontSize: 14, padding: "13px 48px", letterSpacing: "0.06em" }} onClick={completeOnboarding}>Begin</button>
          <button onClick={() => { completeOnboarding(); setProfileOpen(true); setProfileSection("recommend"); }}

            Set up my profile first →
          </button>

          <div style={{ position: "absolute", bottom: 28, fontSize: 10, color: C.border, letterSpacing: "0.14em", textTransform: "uppercase", fontFamily: "'Jost',sans-serif" }}>Aela · Your practice</div>
        </div>
      )}

      {/* ── TOAST CONTAINER ────────────────────────────────────────────────── */}
      <div style={{ position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)", zIndex: 999, display: "flex", flexDirection: "column", gap: 8, alignItems: "center", pointerEvents: "none" }}>
        {toasts.map(t => (
          <div key={t.id} style={{ background: t.type === "success" ? C.sage : t.type === "error" ? C.rose : C.subtle, color: C.white, padding: "10px 20px", borderRadius: 99, fontSize: 13, fontWeight: 500, fontFamily: "'Jost',sans-serif", boxShadow: "0 4px 20px rgba(0,0,0,0.15)", animation: "toastIn 0.3s ease", whiteSpace: "nowrap" }}>
            {t.type === "success" ? "✓ " : t.type === "error" ? "✕ " : "· "}{t.msg}
          </div>
        ))}
      </div>

      {/* ── SHARE OVERLAY ──────────────────────────────────────────────────── */}
      {shareOpen && renderShare()}

      <div style={appStyle}>

        {/* HEADER */}
        <div style={headerStyle}>
          {/* Brand mark only — no wordmark after onboarding */}
          <svg width="26" height="30" viewBox="0 0 80 90" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M40 4 L6 86" stroke={C.text} strokeWidth="5.5" strokeLinecap="round"/>
            <path d="M40 4 L74 86" stroke={C.text} strokeWidth="5.5" strokeLinecap="round"/>
            <path d="M22 52 Q40 38 58 52" stroke={C.sage} strokeWidth="4" strokeLinecap="round" fill="none"/>
            <circle cx="22" cy="52" r="2.5" fill={C.sage}/>
            <circle cx="58" cy="52" r="2.5" fill={C.sage}/>

              </svg>
            </button>
            <button onClick={() => { setProfileOpen(true); setProfileSection(profileFilled ? "goals" : "recommend"); }}
              style={{ width: 40, height: 40, borderRadius: "50%", border: "none", cursor: "pointer", background: profileFilled ? C.sage : C.sand, display: "flex", alignItems: "center", justifyContent: "center", boxShadow: `0 2px 12px rgba(${profileFilled ? "124,158,138" : "196,168,130"},0.35)`, transition: "all 0.3s", position: "relative" }}
              title={profileFilled ? "Profile & Goals" : "Complete your profile"}>
              {profileFilled ? (
                <svg width="18" height="20" viewBox="0 0 80 90" fill="none">
                  <path d="M40 4 L6 86" stroke="#FFFFFF" strokeWidth="6" strokeLinecap="round"/>
                  <path d="M40 4 L74 86" stroke="#FFFFFF" strokeWidth="6" strokeLinecap="round"/>
                  <path d="M22 52 Q40 38 58 52" stroke="rgba(255,255,255,0.65)" strokeWidth="4.5" strokeLinecap="round" fill="none"/>
                  <circle cx="22" cy="52" r="2.8" fill="rgba(255,255,255,0.65)"/>
                  <circle cx="58" cy="52" r="2.8" fill="rgba(255,255,255,0.65)"/>
                </svg>
              ) : (
                <svg width="18" height="20" viewBox="0 0 80 90" fill="none">
                  <path d="M40 4 L6 86" stroke="#FFFFFF" strokeWidth="6" strokeLinecap="round"/>
                  <path d="M40 4 L74 86" stroke="#FFFFFF" strokeWidth="6" strokeLinecap="round"/>
                  <path d="M22 52 Q40 38 58 52" stroke="rgba(255,255,255,0.55)" strokeWidth="4.5" strokeLinecap="round" fill="none"/>
                  <circle cx="22" cy="52" r="2.8" fill="rgba(255,255,255,0.55)"/>
                  <circle cx="58" cy="52" r="2.8" fill="rgba(255,255,255,0.55)"/>
                </svg>
              )}
              {!profileFilled && <span style={{ position: "absolute", top: 1, right: 1, width: 8, height: 8, borderRadius: "50%", background: C.rose, border: `1.5px solid ${C.bg}` }} />}
